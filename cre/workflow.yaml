name: valueoracle-purchase-guard
description: >
  Chainlink CRE workflow reference spec for ValueOracle.
  Supports both standard and confidential purchase evaluation.

  The actual workflow is implemented in TypeScript
  (valueoracle-cre/purchase-guard/main.ts) using the CRE SDK.
  This YAML documents the logical flow for reference.

triggers:
  # Standard purchase — public intent
  - type: onchain_event
    id: standard_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      eventSignature: "PurchaseRequested(bytes32,string,uint256,string,address)"

  # Confidential purchase — only commitment hash is onchain
  - type: onchain_event
    id: confidential_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      eventSignature: "ConfidentialPurchaseRequested(bytes32,bytes32,address)"

actions:
  # Standard flow (TS: onPurchaseRequested handler, HTTPClient with consensus)

  - id: evaluate_purchase
    type: http_request
    trigger: standard_purchase
    config:
      method: POST
      url: "${DECISION_API_URL}/evaluate"
      headers:
        Content-Type: "application/json"
      body:
        itemId: "$(trigger.itemId)"
        price: "$(trigger.proposedPrice)"
        sellerId: "$(trigger.sellerId)"
      timeout: 10000

  - id: write_decision
    type: onchain_write
    trigger: standard_purchase
    depends_on: evaluate_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      function: "onReport(bytes,bytes)"
      note: "CRE KeystoneForwarder calls onReport() via runtime.report() + evmClient.writeReport()"
      gasLimit: 300000

  # Confidential flow (TS: onConfidentialPurchaseRequested handler)
  # Resolves intent via HTTPClient, evaluates via ConfidentialHTTPClient

  - id: resolve_intent
    type: http_request
    trigger: confidential_purchase
    config:
      method: GET
      url: "${DECISION_API_URL}/intent/$(trigger.intentHash)"
      timeout: 5000

  - id: evaluate_confidential
    type: confidential_http_request
    trigger: confidential_purchase
    depends_on: resolve_intent
    config:
      method: POST
      url: "${DECISION_API_URL}/evaluate-confidential"
      headers:
        Content-Type: "application/json"
        Authorization: "Bearer {{.marketplaceApiKey}}"
      body:
        intentHash: "$(trigger.intentHash)"
        itemId: "$(resolve_intent.itemId)"
        price: "$(resolve_intent.price)"
        sellerId: "$(resolve_intent.sellerId)"
      timeout: 10000
      encryptResponse: true
      vaultSecrets:
        - key: "marketplaceApiKey"
        - key: "san_marino_aes_gcm_encryption_key"

  - id: write_confidential_decision
    type: onchain_write
    trigger: confidential_purchase
    depends_on: evaluate_confidential
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      function: "onReport(bytes,bytes)"
      note: "CRE KeystoneForwarder calls onReport() via runtime.report() + evmClient.writeReport()"
      gasLimit: 300000

# Vault DON secrets (threshold-encrypted)
secrets:
  - id: marketplaceApiKey
    description: "Marketplace API key — injected in enclave only"
  - id: san_marino_aes_gcm_encryption_key
    description: "AES-256 key for response encryption"

errorHandling:
  retries: 3
  retryDelay: 5000
  onFailure: log

monitoring:
  enabled: true
  alertOnFailure: true
