name: valueoracle-purchase-guard
description: >
  Chainlink CRE workflow for ValueOracle.
  Supports both standard and confidential purchase evaluation.

  IMPORTANT: This YAML is a reference spec. The actual workflow is now
  implemented in Go (valueoracle-cre-go/purchase-guard/main.go) to use
  the ConfidentialHTTPClient from the Go CRE SDK. The TypeScript SDK
  does not support Confidential HTTP.

triggers:
  # Standard purchase — public intent
  - type: onchain_event
    id: standard_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      eventSignature: "PurchaseRequested(bytes32,string,uint256,string,address)"

  # Confidential purchase — only commitment hash is onchain
  - type: onchain_event
    id: confidential_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      eventSignature: "ConfidentialPurchaseRequested(bytes32,bytes32,address)"

actions:
  # ── Standard flow ──────────────────────────────────────────
  # Implemented in Go: onStandardPurchase() handler
  # Uses http.Client — each node calls the API, consensus on response

  - id: evaluate_purchase
    type: http_request
    trigger: standard_purchase
    config:
      method: POST
      url: "${DECISION_API_URL}/evaluate"
      headers:
        Content-Type: "application/json"
      body:
        itemId: "$(trigger.itemId)"
        price: "$(trigger.proposedPrice)"
        sellerId: "$(trigger.sellerId)"
      timeout: 10000

  - id: fulfill_decision
    type: onchain_write
    trigger: standard_purchase
    depends_on: evaluate_purchase
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      function: "fulfillOracleDecision(bytes32,bool,uint256)"
      args:
        - "$(trigger.requestId)"
        - "$(evaluate_purchase.approved)"
        - "$(evaluate_purchase.referencePrice)"
      gasLimit: 200000

  # ── Confidential flow ─────────────────────────────────────
  # Implemented in Go: onConfidentialPurchase() handler
  # Uses confidentialhttp.Client — request executes inside secure enclave
  # Secrets injected via {{.marketplaceApiKey}} template (Vault DON)
  # Response encrypted with AES-GCM (EncryptOutput: true)

  - id: evaluate_confidential
    type: confidential_http_request
    trigger: confidential_purchase
    config:
      method: POST
      url: "${DECISION_API_URL}/evaluate-confidential"
      headers:
        Content-Type: "application/json"
        Authorization: "Bearer {{.marketplaceApiKey}}"
      body:
        intentHash: "$(trigger.intentHash)"
      timeout: 10000
      encryptResponse: true
      vaultSecrets:
        - key: "marketplaceApiKey"
        - key: "san_marino_aes_gcm_encryption_key"

  - id: fulfill_confidential
    type: onchain_write
    trigger: confidential_purchase
    depends_on: evaluate_confidential
    config:
      network: sepolia
      contractAddress: "${CONTRACT_ADDRESS}"
      function: "fulfillConfidentialDecision(bytes32,bool,uint256)"
      args:
        - "$(trigger.requestId)"
        - "$(evaluate_confidential.approved)"
        - "$(evaluate_confidential.referencePrice)"
      gasLimit: 200000

# Secrets managed via CRE Vault DON (threshold-encrypted, no single node can access)
secrets:
  - id: marketplaceApiKey
    description: "API key for authenticated marketplace data access — injected in enclave only"
  - id: san_marino_aes_gcm_encryption_key
    description: "AES-256 key for response encryption — responses encrypted before leaving enclave"

errorHandling:
  retries: 3
  retryDelay: 5000
  onFailure: log

monitoring:
  enabled: true
  alertOnFailure: true
