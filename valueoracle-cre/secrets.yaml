# Vault DON secrets for ValueOracle CRE workflow
# These secrets are threshold-encrypted and decrypted only inside the secure enclave.
#
# For simulation, provide values via environment variables or .env:
#   export MARKETPLACE_API_KEY_ALL="your-marketplace-api-key"
#   export AES_KEY_ALL="your-256-bit-hex-encoded-key"
secretsNames:
  marketplaceApiKey:
    - MARKETPLACE_API_KEY_ALL
  san_marino_aes_gcm_encryption_key:
    - AES_KEY_ALL
