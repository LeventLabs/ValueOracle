# CRE Workflow Settings — TypeScript with Confidential HTTP
# Standard purchases use HTTPClient (consensus-based).
# Confidential purchases use ConfidentialHTTPClient (enclave execution).

staging-settings:
  user-workflow:
    workflow-name: "purchase-guard-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

production-settings:
  user-workflow:
    workflow-name: "purchase-guard-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "../secrets.yaml"
